name: "FastApi"

services:
  postgresql:
    image: postgres:15
    container_name: postgresql
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: Database
#    volumes:
#      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d Database" ]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    env_file:
      - .env
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
    networks:
      - app
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

#  rabbitmq:
#    image: rabbitmq:4-management
#    container_name: rabbitmq
#    restart: always
#    env_file:
#      - .env
#    environment:
#      RABBITMQ_DEFAULT_USER: ${RABITMQ_USERNAME}
#      RABBITMQ_DEFAULT_PASS: ${RABITMQ_PASSWORD}
#    volumes:
#      - ./rabbitmq_data:/var/lib/rabbitmq
#    networks:
#      - app
#    healthcheck:
#      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
#      interval: 30s
#      timeout: 10s
#      retries: 3

  mongodb:
    image: mongo
    container_name: mongodb
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    ports:
      - ${MONGODB_PORT}
    networks:
      - app
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval 'db.adminCommand(\"ping\")' | grep -q ok" ]
      interval: 30s
      timeout: 10s
      retries: 3

  alembic:
    build: ./migration
    restart: on-failure
    networks:
      - app
    volumes:
      - ./app/:/app/app
      - ./.env:/app/.env
      - ./config.py:/app/config.py
      - ./migration/:/app/migration
      - ./alembic.ini/:/app/alembic.ini
    depends_on:
      postgresql:
        condition: service_healthy
    command: alembic upgrade head

#  rabbitmq_worker:
#    build: ./workers/rabbitmq
#    container_name: rabbitmq_worker
#    restart: always
#    volumes:
#      - ./app/:/app/app
#      - ./config.py:/app/config.py
#      - ./.env:/app/.env
#    networks:
#      - app
#    depends_on:
#      rabbitmq:
#        condition: service_healthy

  main:
    build: .
    container_name: fastapi
    restart: always
    ports:
      - 8000:8000
    networks:
      - app
    depends_on:
      postgresql:
        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

#volumes:
#  postgres_data:
#  rabbitmq_data:

networks:
  app:
    driver: bridge
